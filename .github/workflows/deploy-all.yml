name: Deploy R2 and Workers

on:
  push:
    branches:
      - main
    paths:
      - 'MAS_AIO.cmd'
      - 'MAS_worker.js'

jobs:
  deploy-r2:
    name: Upload to R2
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Upload MAS_AIO to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
        run: |
          aws s3 cp MAS_AIO.cmd s3://${{ secrets.R2_BUCKET_NAME }}/src/mas/MAS_AIO.cmd \
            --endpoint-url https://${{ secrets.R2_ACCOUNT_ID }}.r2.cloudflarestorage.com

  deploy-worker:
    name: Deploy Cloudflare Worker
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy Worker via Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.R2_ACCOUNT_ID }}
          command: deploy MAS_worker.js --name get-tuancute --compatibility-date 2024-03-04